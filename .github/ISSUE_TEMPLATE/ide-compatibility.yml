---
name: 🤖 IDE Compatibility
description: IDE별 경로 변경이나 호환성 문제 리포트 / Report IDE path changes or compatibility issues
labels: ["ide-compat"]
body:
  - type: markdown
    attributes:
      value: |
        IDE의 커스터마이징 경로가 바뀌었거나 Musher 파일이 IDE에서 인식되지 않을 때 사용하세요.
        Use this when an IDE changed its customization paths or Musher files aren't recognized.

  - type: dropdown
    id: ide
    attributes:
      label: 해당 IDE / Affected IDE
      options:
        - VS Code Copilot
        - Claude Code
        - Cursor
        - Codex (OpenAI)
        - Windsurf
        - Antigravity
    validations:
      required: true

  - type: input
    id: ide-version
    attributes:
      label: IDE 버전 / IDE Version
      placeholder: "VS Code 1.95.0 / Claude Code 1.0.x"
    validations:
      required: true

  - type: input
    id: musher-version
    attributes:
      label: Musher 버전 / Musher Version
      placeholder: "0.6.5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 무엇이 변경되었나요? / What changed?
      description: IDE가 인식하는 경로가 바뀌었는지, 어떤 파일이 작동하지 않는지 설명해주세요.
      placeholder: |
        - 이전 경로: `.github/copilot-instructions.md`
        - 새 경로: `.github/copilot/instructions.md`
        - 참고 문서: https://...
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 근거 / Evidence
      description: 공식 문서 링크, 스크린샷, 에러 메시지 등
