---
name: ✨ Feature Request
description: 새 기능이나 개선을 제안할 때 사용하세요 / Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안을 해주셔서 감사합니다!
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하나요? / What problem does this solve?
      description: 이 기능이 필요한 이유를 설명해주세요.
      placeholder: "~할 때 ~해서 불편합니다 / When I do X, I find it frustrating that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 원하는 해결책 / Proposed solution
      description: 어떻게 동작하면 좋겠는지 설명해주세요.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 카테고리 / Category
      options:
        - 새 스킬 / New Skill
        - 새 에이전트 / New Agent
        - IDE 지원 / IDE Support
        - Team 모드 / Team Mode
        - CLI
        - 문서 / Documentation
        - 기타 / Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 / Alternatives considered
      description: 고려해본 다른 방법이 있다면 알려주세요.

  - type: textarea
    id: context
    attributes:
      label: 추가 정보 / Additional context
      description: 스크린샷, 관련 이슈/PR 링크 등
